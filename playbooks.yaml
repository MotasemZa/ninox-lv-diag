# Each playbook = one button in the UI.
# {db_path} is substituted at runtime. {run_id} is a per-run UUID.
# All commands MUST be prefixed: tsh ssh apollo@<host> "<cmd>"
# Allowed lv subcommands are enforced in code, not just here.

playbooks:

  - id: quick_health
    label: "Quick health check"
    description: "Fast triage. Lock status, manifest/SST integrity, basic key iteration. ~2s."
    estimated_seconds: 5
    steps:
      - name: "Diagnose"
        cmd: "lv diagnose --readonly --json {db_path}"
        parse: json
      - name: "Stats"
        cmd: "lv stats --readonly --json {db_path}"
        parse: json
    severity:
      red_if:
        - "steps[0].result.checks[*].status contains 'fail'"
      amber_if:
        - "steps[0].result.status == 'warning'"

  - id: full_report
    label: "Full report"
    description: "Comprehensive: schema, NinoxScript analysis, metrics, health diagnostics. Recommended for most tickets. ~10-60s."
    estimated_seconds: 30
    steps:
      - name: "Generate report"
        cmd: "lv report --readonly -o /tmp/lv-{run_id} --name report {db_path}"
        parse: none
      - name: "Fetch markdown"
        fetch: "/tmp/lv-{run_id}/report-report.md"
        as: markdown
      - name: "Fetch JSON"
        fetch: "/tmp/lv-{run_id}/report-report.json"
        as: json
      - name: "Cleanup"
        cmd: "rm -rf /tmp/lv-{run_id}"
        parse: none
    severity:
      red_if:
        - "fetched.json.analysis.errors > 0"
        - "fetched.json.health == 'fail'"
      amber_if:
        - "fetched.json.analysis.warnings > 0"
        - "fetched.json.health == 'warning'"

  - id: integrity_check
    label: "Integrity check"
    description: "Validates key format, JSON parsing, schema compliance, and reference integrity. Use when records appear missing or formulas misbehave. ~10s."
    estimated_seconds: 15
    steps:
      - name: "Validate"
        cmd: "lv validate --readonly --check-schema --check-references --json --limit 100 {db_path}"
        parse: json
      - name: "Orphans"
        cmd: "lv orphans --readonly --json {db_path}"
        parse: json
    severity:
      red_if:
        - "steps[0].result.issues | length > 0"
        - "steps[1].result.orphans | length > 0"

  - id: deep_scan
    label: "Deep corruption scan"
    description: "SLOW. Full key iteration with checksum validation. Run only when corruption is suspected. May take several minutes."
    estimated_seconds: 300
    confirm: true   # require operator to confirm before running
    steps:
      - name: "Deep diagnose"
        cmd: "lv diagnose --readonly --deep --check-manifest --check-sst --json {db_path}"
        parse: json
        timeout_seconds: 600
    severity:
      red_if:
        - "steps[0].result.checks[*].status contains 'fail'"

